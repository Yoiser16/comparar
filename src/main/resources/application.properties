spring.application.name=comparar

# Configuración de tamaño máximo de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuración del puerto (para Google Cloud Run usar 8080)
server.port=8081

# Configuración de H2 Database
spring.datasource.url=jdbc:h2:file:./data/historico
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (opcional, para debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
