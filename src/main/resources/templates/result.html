<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Auditoría Detallado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        slate: { 850: '#1e293b', 900: '#0f172a' },
                        accent: '#f97316', // Naranja
                        brand: '#3b82f6',  // Azul
                    }
                }
            }
        }
    </script>
    <script>
        // Dark mode initialization - debe correr antes del render
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        /* Estilo para ocultar/mostrar pestañas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom-color: #f97316; color: #f97316; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-slate-800 dark:text-slate-200 min-h-screen transition-colors">

    <div class="bg-white dark:bg-gray-800 border-b border-slate-200 dark:border-gray-700 shadow-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
            <div class="flex flex-col justify-between items-stretch py-3 gap-3">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 rounded-lg bg-slate-100 dark:bg-gray-700 hover:bg-slate-200 dark:hover:bg-gray-600 text-slate-600 dark:text-slate-300 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <h1 class="text-lg md:text-xl font-bold text-slate-900 dark:text-white uppercase tracking-tight">Auditoría de Datos</h1>
                    <!-- Dark mode toggle -->
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-gray-700 hover:bg-slate-200 dark:hover:bg-gray-600 text-slate-600 dark:text-yellow-400 transition-colors">
                        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <a href="/historico" class="ml-auto px-3 py-1.5 bg-orange-600 hover:bg-orange-700 text-white text-xs font-bold rounded-lg transition-colors shadow-sm flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Histórico
                    </a>
                </div>
                
                <div class="flex flex-wrap gap-2 text-xs justify-center md:justify-start">
                    <div class="px-2 py-1 bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200 rounded border border-green-200 dark:border-green-700 font-bold">
                        COINCIDEN: <span th:text="${result.totalMatches}">0</span>
                    </div>
                    <div class="px-2 py-1 bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded border border-blue-200 dark:border-blue-700 font-bold">
                        SOLO CSV: <span th:text="${result.onlyInCsv.size()}">0</span>
                    </div>
                    <div class="px-2 py-1 bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-200 rounded border border-emerald-200 dark:border-emerald-700 font-bold">
                        SOLO EXCEL: <span th:text="${result.onlyInExcel.size()}">0</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center border-t border-slate-100 dark:border-gray-700 mt-2 pt-2 gap-3">
                <div class="flex space-x-4 md:space-x-8 overflow-x-auto">
                    <h2 class="py-2 md:py-3 text-xs md:text-sm font-bold text-slate-800 dark:text-slate-200 uppercase tracking-wide">
                        Coincidencias
                    </h2>
                </div>
                <div class="flex flex-col md:flex-row gap-2 md:gap-1.5">
                    <!-- Botones de descarga -->
                    <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-1.5 w-full md:w-auto">
                        <a href="/download/matches?format=csv" class="flex items-center justify-center gap-1.5 px-3 md:px-2.5 py-2 md:py-1 bg-green-600 hover:bg-green-700 text-white text-xs md:text-[11px] font-semibold rounded-md transition-colors">
                            <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Descargar CSV
                        </a>
                        <a href="/download/matches?format=excel" class="flex items-center justify-center gap-1.5 px-3 md:px-2.5 py-2 md:py-1 bg-green-700 hover:bg-green-800 text-white text-xs md:text-[11px] font-semibold rounded-md transition-colors">
                            <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Descargar Excel
                        </a>
                        <!-- Botón LIVEJOY Tutora con campos de porcentajes (solo si hay registros LIVEJOY) -->
                        <div th:if="${result.matchingRecords.?[data != null and data['Excel_Sheet'] == 'LIVEJOY'].size() > 0}" 
                             class="flex flex-col md:flex-row md:items-center gap-1.5 md:gap-2 p-2.5 md:p-1.5 bg-purple-50 dark:bg-purple-900/20 rounded-md border border-purple-200 dark:border-purple-800">
                            <label class="text-xs md:text-[11px] font-semibold text-purple-900 dark:text-purple-100">Configuración LIVEJOY Tutora:</label>
                            <div class="flex flex-wrap items-center gap-1.5 md:gap-1">
                                <div class="flex items-center gap-1">
                                    <input type="number" id="porcentaje1" value="12" min="0" max="100" step="0.1" 
                                           class="w-16 md:w-14 px-1.5 py-0.5 text-xs border border-purple-300 dark:border-purple-600 rounded focus:ring-2 focus:ring-purple-500 dark:bg-slate-800 dark:text-white">
                                    <span class="text-xs md:text-[11px] text-purple-700 dark:text-purple-300">%</span>
                                </div>
                                <span class="text-xs md:text-[11px] text-purple-600 dark:text-purple-400">×</span>
                                <div class="flex items-center gap-1">
                                    <input type="number" id="porcentaje2" value="40" min="0" max="100" step="0.1" 
                                           class="w-16 md:w-14 px-1.5 py-0.5 text-xs border border-purple-300 dark:border-purple-600 rounded focus:ring-2 focus:ring-purple-500 dark:bg-slate-800 dark:text-white">
                                    <span class="text-xs md:text-[11px] text-purple-700 dark:text-purple-300">%</span>
                                </div>
                                <button onclick="downloadLivejoyTutora()" 
                                        class="flex items-center justify-center gap-1.5 px-2.5 py-1 bg-purple-600 hover:bg-purple-700 text-white text-[11px] font-semibold rounded-md transition-colors">
                                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                    Descargar
                                </button>
                            </div>
                        </div>
                        <!-- Botón SALSA Resumen con campos de porcentajes (solo si hay registros SALSA) -->
                        <div th:if="${result.matchingRecords.?[data != null and data['Excel_Sheet'] == 'SALSA'].size() > 0}" 
                             class="flex flex-col md:flex-row md:items-center gap-1.5 md:gap-2 p-2.5 md:p-1.5 bg-amber-50 dark:bg-amber-900/20 rounded-md border border-amber-200 dark:border-amber-800">
                            <label class="text-xs md:text-[11px] font-semibold text-amber-900 dark:text-amber-100">Configuración SALSA Tutora:</label>
                            <div class="flex flex-wrap items-center gap-1.5 md:gap-1">
                                <div class="flex items-center gap-1">
                                    <span class="text-xs md:text-[11px] text-amber-700 dark:text-amber-300">Descuento:</span>
                                    <input type="number" id="porcentajeSalsa" value="60" min="0" max="100" step="0.1" 
                                           class="w-16 md:w-14 px-1.5 py-0.5 text-xs border border-amber-300 dark:border-amber-600 rounded focus:ring-2 focus:ring-amber-500 dark:bg-slate-800 dark:text-white">
                                    <span class="text-xs md:text-[11px] text-amber-700 dark:text-amber-300">%</span>
                                </div>
                                <button onclick="downloadSalsaResumen()" 
                                        class="flex items-center justify-center gap-1.5 px-2.5 py-1 bg-amber-600 hover:bg-amber-700 text-white text-[11px] font-semibold rounded-md transition-colors">
                                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                    Descargar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 md:py-8">
        
        <div class="mb-4 md:mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchBox" onkeyup="filterCards()" class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-gray-600 rounded-lg leading-5 bg-white dark:bg-gray-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent text-sm shadow-sm" placeholder="Buscar ID o datos en la pestaña actual...">
        </div>

        <div id="tab-matches" class="tab-content active">
            <div class="grid gap-4 card-container">
                <div th:each="record : ${result.matchingRecords}" class="search-item bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-slate-200 dark:border-gray-700 overflow-hidden hover:border-accent dark:hover:border-accent transition-colors">
                    <div class="grid grid-cols-1 lg:grid-cols-12">
                        <div class="lg:col-span-1 bg-slate-50 dark:bg-gray-700 border-b lg:border-b-0 lg:border-r border-slate-200 dark:border-gray-600 p-3 flex flex-row lg:flex-col items-center justify-center lg:justify-center gap-2 lg:gap-0 text-center">
                            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase">ID</span>
                            <span class="text-sm md:text-base font-mono font-bold text-slate-800 dark:text-slate-100 break-all max-w-full" th:text="${record.id}">001</span>
                            <span class="px-2 py-0.5 bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-200 text-[10px] font-bold rounded border border-green-200 dark:border-green-700">COINCIDE</span>
                            <div class="mt-1 w-full px-1">
                                <span th:if="${record.data.get('Excel_Nombre Completo') != null}" class="text-xs text-slate-700 dark:text-slate-300 font-semibold px-2 py-1.5 bg-blue-50 dark:bg-blue-900/30 rounded block break-words" th:text="${record.data.get('Excel_Nombre Completo')}"></span>
                                <span th:if="${record.data.get('CSV_Nombre Completo') != null and record.data.get('Excel_Nombre Completo') == null}" class="text-xs text-slate-700 dark:text-slate-300 font-semibold px-2 py-1.5 bg-blue-50 dark:bg-blue-900/30 rounded block break-words" th:text="${record.data.get('CSV_Nombre Completo')}"></span>
                            </div>
                        </div>
                        <div class="lg:col-span-11 p-3 md:p-4 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            <div>
                                <h4 class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase mb-2 border-b border-blue-100 dark:border-blue-800">Datos CSV</h4>
                                <dl class="text-sm grid gap-1">
                                    <div th:each="entry : ${record.data}" th:if="${#strings.startsWith(entry.key, 'CSV_')}" class="grid grid-cols-3">
                                        <dt class="text-slate-500 dark:text-slate-400 col-span-1" th:text="${#strings.substringAfter(entry.key, 'CSV_')}"></dt>
                                        <dd class="text-slate-900 dark:text-slate-100 font-mono col-span-2 font-medium" th:text="${entry.value}"></dd>
                                    </div>
                                </dl>
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase mb-2 border-b border-emerald-100 dark:border-emerald-800">Datos Excel</h4>
                                <dl class="text-sm grid gap-1">
                                    <div th:each="entry : ${record.data}" th:if="${#strings.startsWith(entry.key, 'Excel_')}" class="grid grid-cols-3">
                                        <dt class="text-slate-500 dark:text-slate-400 col-span-1" th:text="${#strings.substringAfter(entry.key, 'Excel_')}"></dt>
                                        <dd class="text-slate-900 dark:text-slate-100 font-mono col-span-2 font-medium" th:text="${entry.value}"></dd>
                                    </div>
                                </dl>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(result.matchingRecords)}" class="text-center py-12 text-slate-500 dark:text-slate-400 italic border-2 border-dashed border-slate-200 dark:border-gray-700 rounded-lg">
                    No hay coincidencias.
                </div>
            </div>
        </div>



    </div>

    <script>
        // Lógica de Búsqueda
        function filterCards() {
            const input = document.getElementById('searchBox');
            const filter = input.value.toUpperCase();
            const cards = document.getElementsByClassName('search-item');

            for (let i = 0; i < cards.length; i++) {
                const txtValue = cards[i].textContent || cards[i].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // Dark mode toggle functionality
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (darkModeToggle) {
            darkModeToggle.addEventListener('click', () => {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';
                }
            });
        }
    </script>
    <script>
        function downloadLivejoyTutora() {
            const p1 = document.getElementById('porcentaje1').value;
            const p2 = document.getElementById('porcentaje2').value;
            window.location.href = `/download/livejoy-tutora?p1=${p1}&p2=${p2}`;
        }
        
        function downloadSalsaResumen() {
            const descuento = document.getElementById('porcentajeSalsa').value;
            window.location.href = `/download/salsa-resumen?descuento=${descuento}`;
        }
    </script>
</body>
</html>
